<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Kovin monogram">
  <title>Kovin — K Monogram</title>

  <!-- Rounded background tile -->
  <rect width="64" height="64" rx="16" fill="#1A1612"/>

  <!-- K letterform — geometric, clean -->
  <!-- Vertical stem -->
  <rect x="16" y="13" width="4.5" height="38" rx="2" fill="#F7F4EF"/>
  <!-- Upper diagonal arm -->
  <path d="M20.5 32 L42 13" stroke="#F7F4EF" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Lower diagonal leg -->
  <path d="M20.5 32 L42 51" stroke="#F7F4EF" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Copper accent dot — brand signature -->
  <circle cx="44" cy="51" r="4" fill="#E35336"/>
</svg>
