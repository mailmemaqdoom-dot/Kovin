<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" fill="none" role="img" aria-label="Kovin">
  <title>Kovin — Reverse / White</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&amp;display=swap');
      .wordmark {
        font-family: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
        font-weight: 600;
        font-size: 42px;
        letter-spacing: 0.08em;
        fill: #F7F4EF;
      }
