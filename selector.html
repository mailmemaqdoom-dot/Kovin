<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0">

<title>Find What Fits · Kovin</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>

/* ══════════════════════════════════════════
   KOVIN SELECTOR — Design tokens
═══════════════════════════════════════════ */
:root {
  --ink:           #1A1612;
  --paper:         #F7F4EF;
  --paper-warm:    #EDE8E0;
  --copper:        #E35336;
  --copper-deep:   #C9432A;
  --sand:          #F4A460;
  --stage-bg:      #0F0D0B;
  --border:        rgba(26,22,18,0.08);
  --font-display:  'Cormorant Garamond', Georgia, serif;
  --font-body:     'Inter', system-ui, sans-serif;
  --ease-expo:     cubic-bezier(0.16, 1, 0.3, 1);
  --ease-smooth:   cubic-bezier(0.22, 1, 0.36, 1);
  --ease-spring:   cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* ══ Reset ══ */
*, *::before, *::after { box-sizing: border-box; }
* { margin: 0; }
html { height: 100%; scroll-behavior: auto; }
body {
  font-family: var(--font-body);
  background: var(--stage-bg);
  color: var(--paper);
  min-height: 100%;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
button { font: inherit; color: inherit; cursor: pointer; border: none; background: none; -webkit-tap-highlight-color: transparent; }
a { color: inherit; text-decoration: none; -webkit-tap-highlight-color: transparent; }
svg { display: block; }
img { display: block; max-width: 100%; }
:focus-visible { outline: 2px solid var(--copper); outline-offset: 3px; border-radius: 4px; }

/* ══ App shell ══ */
.sel-app {
  display: flex;
  flex-direction: column;
  min-height: 100dvh;
}

/* ══════════════════════════════════════════
   HEADER — glass, fixed
═══════════════════════════════════════════ */
.sel-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: calc(56px + env(safe-area-inset-top, 0px));
  padding: env(safe-area-inset-top, 0px) 18px 0;
  display: flex; align-items: center; justify-content: space-between;
  z-index: 100;
  background: rgba(15,13,11,0.68);
  -webkit-backdrop-filter: blur(24px) saturate(1.4);
  backdrop-filter: blur(24px) saturate(1.4);
  border-bottom: 1px solid rgba(247,244,239,0.07);
}

.sel-back {
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  background: rgba(247,244,239,0.09);
  border: 1px solid rgba(247,244,239,0.12);
  color: rgba(247,244,239,0.72);
  transition: background 0.2s ease, color 0.2s ease;
}
.sel-back:hover { background: rgba(247,244,239,0.16); color: var(--paper); }
.sel-back svg { width: 16px; height: 16px; }

.sel-wordmark {
  font-family: var(--font-display);
  font-size: 1.48rem; font-weight: 500; letter-spacing: -0.02em;
  color: var(--paper);
}
.sel-wordmark span { color: var(--copper); }

.sel-cart-btn {
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  background: rgba(247,244,239,0.09);
  border: 1px solid rgba(247,244,239,0.12);
  color: rgba(247,244,239,0.72);
  position: relative;
  transition: background 0.2s ease, color 0.2s ease;
}
.sel-cart-btn:hover { background: rgba(247,244,239,0.16); color: var(--paper); }
.sel-cart-btn svg { width: 17px; height: 17px; }
.sel-cart-count {
  position: absolute; top: -2px; right: -2px;
  min-width: 17px; height: 17px; padding: 0 4px;
  background: var(--copper); color: #fff;
  border-radius: 9px; border: 2px solid var(--stage-bg);
  font-size: 0.6rem; font-weight: 700;
  display: none; place-items: center;
  animation: pop 0.4s var(--ease-spring);
}
@keyframes pop { 0%{transform:scale(0.4)} 60%{transform:scale(1.3)} 100%{transform:scale(1)} }

/* ══════════════════════════════════════════
   STAGE — the product lives here
═══════════════════════════════════════════ */
.sel-stage {
  position: relative;
  height: clamp(360px, 62dvh, 560px);
  overflow: hidden;
  flex-shrink: 0;
  /* Padding for header */
  padding-top: calc(56px + env(safe-area-inset-top, 0px));
}

/* Ambient glow — colour changes per scenario via JS */
.sel-glow {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  transition: background 0.72s ease;
}

/* Product image stack — all images pre-loaded, GSAP controls visibility */
.sel-img-wrap {
  position: absolute;
  inset: 0;
  display: flex; align-items: center; justify-content: center;
  padding: 0 10%;
  z-index: 2;
}

.sel-product-img {
  position: absolute;
  max-width: 68%; max-height: 74%;
  object-fit: contain;
  will-change: transform, opacity;
  transform-origin: center 55%;
  opacity: 0;
  /* Floating animation applied via GSAP after transition */
}

/* Stage bottom fade — paper emerges from the dark */
.sel-stage-fade {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: clamp(120px, 28%, 200px);
  background: linear-gradient(to top,
    var(--paper) 0%,
    rgba(247,244,239,0.82) 28%,
    transparent 100%);
  pointer-events: none;
  z-index: 3;
}

/* ══════════════════════════════════════════
   CHIPS — orbit the product stage bottom
═══════════════════════════════════════════ */
.sel-chips-wrap {
  position: relative;
  z-index: 10;
  background: var(--paper);
  padding: 0 20px 8px;
  /* Overlap into stage so chips feel attached to the product */
  margin-top: -32px;
}

.sel-chips {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
}

.sel-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 9px 15px;
  border-radius: 100px;
  font-size: 0.78rem; font-weight: 600;
  letter-spacing: 0.01em;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
  /* Default: ink on paper-warm */
  background: var(--paper-warm);
  color: rgba(26,22,18,0.55);
  border: 1.5px solid rgba(26,22,18,0.08);
  will-change: transform, background;
  /* Native CSS transition handles hover/default states;
     GSAP handles active selection */
  transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease,
              box-shadow 0.2s ease;
  -webkit-tap-highlight-color: transparent;
}
.sel-chip:hover:not(.is-active) {
  background: var(--paper-warm);
  color: var(--ink);
  border-color: rgba(26,22,18,0.18);
}
.sel-chip.is-active {
  background: var(--copper);
  color: #fff;
  border-color: var(--copper);
  box-shadow: 0 6px 18px -4px rgba(227,83,54,0.48);
}
.sel-chip:active { transform: scale(0.93); }
.sel-chip-icon { font-size: 0.84rem; line-height: 1; }

/* ══════════════════════════════════════════
   CONTENT — the recommendation card
═══════════════════════════════════════════ */
.sel-content {
  background: var(--paper);
  color: var(--ink);
  padding: 20px 24px 0;
  flex: 1;
}

/* Each element wrapped for stagger animation */
.sel-anim { will-change: transform, opacity; }

.sel-confidence {
  display: inline-flex; align-items: center; gap: 7px;
  font-size: 0.68rem; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--copper);
  margin-bottom: 6px;
}
.sel-confidence::before {
  content: '';
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--copper); flex-shrink: 0;
}

.sel-product-name {
  font-family: var(--font-display);
  font-size: clamp(1.55rem, 5.5vw, 2rem);
  font-weight: 500; letter-spacing: -0.022em; line-height: 1.08;
  margin-bottom: 16px;
}

.sel-divider {
  width: 100%; height: 1px;
  background: var(--border);
  margin-bottom: 16px;
}

.sel-headline {
  font-family: var(--font-display);
  font-size: clamp(1.25rem, 4.5vw, 1.55rem);
  font-weight: 400; font-style: italic;
  line-height: 1.22; margin-bottom: 10px;
  color: var(--ink);
}

.sel-fit {
  font-size: 0.88rem; line-height: 1.68;
  color: rgba(26,22,18,0.58);
  margin-bottom: 16px;
  max-width: 380px;
}

.sel-highlights {
  list-style: none; padding: 0;
  display: flex; flex-direction: column; gap: 7px;
  margin-bottom: 0;
}
.sel-highlights li {
  display: flex; align-items: flex-start; gap: 10px;
  font-size: 0.82rem; line-height: 1.5;
  color: rgba(26,22,18,0.72);
}
.sel-highlights li::before {
  content: '';
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--copper); margin-top: 6px; flex-shrink: 0;
}

/* ══════════════════════════════════════════
   CTAs — thumb-zone, full-width
═══════════════════════════════════════════ */
.sel-cta-area {
  padding: 24px 20px calc(env(safe-area-inset-bottom, 0px) + 24px);
  background: var(--paper);
  display: flex; flex-direction: column; gap: 10px;
}

.sel-btn-primary {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; min-height: 52px;
  padding: 15px 24px; border-radius: 100px;
  background: var(--copper); color: #fff;
  font-size: 0.92rem; font-weight: 600; letter-spacing: 0.01em;
  box-shadow: 0 12px 28px -8px rgba(227,83,54,0.52);
  transition: background 0.22s ease, box-shadow 0.22s ease, transform 0.14s var(--ease-spring);
  will-change: transform;
}
.sel-btn-primary:hover { background: var(--copper-deep); }
.sel-btn-primary:active { transform: scale(0.96); }
.sel-btn-primary svg { width: 16px; height: 16px; }

.sel-btn-secondary {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; min-height: 50px;
  padding: 14px 24px; border-radius: 100px;
  background: transparent; color: var(--ink);
  font-size: 0.88rem; font-weight: 500;
  border: 1.5px solid rgba(26,22,18,0.18);
  transition: background 0.22s ease, border-color 0.22s ease, transform 0.14s var(--ease-spring);
  will-change: transform;
}
.sel-btn-secondary:hover { background: var(--paper-warm); border-color: rgba(26,22,18,0.28); }
.sel-btn-secondary:active { transform: scale(0.96); }
.sel-btn-secondary svg { width: 16px; height: 16px; flex-shrink: 0; }

/* ══════════════════════════════════════════
   SUCCESS STATE — keeps this ready button
═══════════════════════════════════════════ */
.sel-btn-primary.is-added {
  background: #25D366;
  box-shadow: 0 12px 28px -8px rgba(37,211,102,0.42);
}

/* ══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
.sel-toast {
  position: fixed;
  bottom: calc(env(safe-area-inset-bottom, 0px) + 84px);
  left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: var(--ink); color: var(--paper);
  padding: 11px 22px; border-radius: 100px;
  font-size: 0.82rem; font-weight: 600;
  box-shadow: 0 8px 32px rgba(0,0,0,0.28);
  opacity: 0; pointer-events: none;
  white-space: nowrap; max-width: 88vw;
  z-index: 200;
}

/* ══════════════════════════════════════════
   DESKTOP — centered phone-frame
═══════════════════════════════════════════ */
@media (min-width: 720px) {
  body { background: #07060504; background-color: #0A0807; }
  .sel-app {
    max-width: 468px; margin: 0 auto;
    background: var(--stage-bg);
    box-shadow: 0 0 120px rgba(0,0,0,0.7), 0 0 0 1px rgba(247,244,239,0.04);
    min-height: 100dvh;
  }
  .sel-header {
    max-width: 468px;
    left: 50%; transform: translateX(-50%);
  }
}

/* ══ Reduced motion ══ */
@media (prefers-reduced-motion: reduce) {
  * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
}

</style>

  /* ─── Scenarios — each maps a life moment to the right product ─── */
  const SCENARIOS = [
    {

    },
    {

      highlights: [

      ],
    },
    {
      id:        'travel',
      label:     'Travel',
      icon:      '✈️',
      productId: 4,
      glow:      'radial-gradient(ellipse 80% 60% at 50% 20%, rgba(70,120,200,0.28) 0%, transparent 65%)',
      confidence: 'Easiest recommendation for travel',
      headline:  'Airports. Trains. Long flights.',
      fit:       'A full travel day on one charge. The noise disappears before the aircraft reaches altitude.',
      highlights: [

        '3 minutes charging gives 3 hours playback',
      ],
    },
    {
      id:        'cinema',
      label:     'Home Cinema',
      icon:      '🎬',
      productId: 3,
      glow:      'radial-gradient(ellipse 80% 60% at 50% 20%, rgba(200,140,40,0.28) 0%, transparent 65%)',
      confidence: 'Straightforward choice for most rooms',
      headline:  'The living room, properly done.',
      fit:       'Calibrated 4K for medium rooms. The sound that comes with it often removes the need for a soundbar.',
      highlights: [
        'True 4K calibrated for medium living rooms',
        'Dolby Audio built in — soundbar often unnecessary',
        'All streaming services included, no extra box',
      ],
    },
    {
      id:        'daily',
      label:     'Daily',
      icon:      '🌅',
      productId: 1,
      glow:      'radial-gradient(ellipse 80% 60% at 50% 20%, rgba(227,83,54,0.24) 0%, transparent 65%)',
      confidence: 'Reliable long-term choice',
      headline:  'Everything the day needs.',
      fit:       'No mid-day charge. No slowdown. A phone that keeps moving without needing attention.',
      highlights: [
        '14–16 hours on a single charge',
        'Handles heavy multitasking without slowing',
        'Screen stays accurate all day, easy at night',
      ],
    },
    {
      id:        'calls',
      label:     'Calls',
      icon:      '🗣️',
      productId: 4,
      glow:      'radial-gradient(ellipse 80% 60% at 50% 20%, rgba(100,90,180,0.26) 0%, transparent 65%)',
      confidence: 'Easiest recommendation for calls',
      headline:  'Clear in any environment.',
      fit:       'Eight microphones isolate your voice. People hear you — not the room, not the road, not the café.',
      highlights: [
        '8 dedicated microphones for voice clarity',
        'Proven clear in traffic, offices, and outdoors',
        'Wireless and hands-free for the whole day',
      ],
    },
    {
      id:        'compact',
      label:     'One-Handed',
      icon:      '🤌',
      productId: 2,
      glow:      'radial-gradient(ellipse 80% 60% at 50% 20%, rgba(244,164,96,0.26) 0%, transparent 65%)',
      confidence: 'Better for camera-focused users',
      headline:  'Compact without compromise.',
      fit:       'Fits in a pocket, reaches every corner with one hand, and photographs better than most larger phones.',
      highlights: [
        'Genuinely one-handed reach — every corner',
        'Camera quality that punches well above its size',
        'Clean, fast Google software — no clutter',
      ],
    },
  ];

  /* ─── State ─── */
  let activeScenario = null;
  let floatTween = null;
  let toastTimer = null;

  /* ─── DOM refs ─── */
  const selGlow      = document.getElementById('selGlow');
  const selImgWrap   = document.getElementById('selImgWrap');
  const selChips     = document.getElementById('selChips');
  const selConfidence = document.getElementById('selConfidence');
  const selProductName = document.getElementById('selProductName');
  const selHeadline  = document.getElementById('selHeadline');
  const selFit       = document.getElementById('selFit');
  const selHighlights = document.getElementById('selHighlights');
  const selKeepBtn   = document.getElementById('selKeepBtn');
  const selKeepLabel = document.getElementById('selKeepLabel');
  const selAskBtn    = document.getElementById('selAskBtn');
  const selToast     = document.getElementById('selToast');
  const selCartCount = document.getElementById('selCartCount');

  /* ─── Animatable elements for stagger ─── */
  const ANIM_ELS = () => [selConfidence, selProductName, document.querySelector('.sel-divider'), selHeadline, selFit, selHighlights];

  /* ── Life Mode acknowledgment — set via lifemode.html ──
     Light-touch: shows a banner and biases which scenario opens
     first. Does not duplicate lifemode.html's full dataset. ── */
  const LIFE_MODE_INFO = {
    college: { icon: '🎓', title: 'Starting College', scenario: 'daily' },
    parents: { icon: '👪', title: 'Buying For Parents', scenario: 'daily' },
    salary: { icon: '💼', title: 'First Salary', scenario: 'work' },
    wfh: { icon: '🏠', title: 'Work From Home', scenario: 'focus' },
    travel: { icon: '✈️', title: 'Travelling Frequently', scenario: 'travel' },
    creator: { icon: '🎬', title: 'Content Creation', scenario: 'photo' },
    business: { icon: '📈', title: 'Business Essentials', scenario: 'calls' },
    entertainment: { icon: '🎥', title: 'Entertainment Upgrade', scenario: 'cinema' },
    newhome: { icon: '🏡', title: 'Moving Into A New Home', scenario: 'cinema' },
  };
  function applyLifeModeBanner() {
    let modeId = null;
    try { modeId = localStorage.getItem('kovin-life-mode'); } catch (e) {}
    const info = modeId ? LIFE_MODE_INFO[modeId] : null;
    const banner = document.getElementById('lifeModeBanner');
    const bannerText = document.getElementById('lifeModeBannerText');
    if (info && banner && bannerText) {
      banner.style.display = 'flex';
      bannerText.textContent = `${info.icon} Tailored for: ${info.title}`;
      return info.scenario;
    }
    return null;
  }

  /* ══ Initialise ══ */
  function init() {
    buildImages();
    buildChips();
    syncCartBadge();
    const biasedScenario = applyLifeModeBanner();
    const startId = (biasedScenario && SCENARIOS.find(s => s.id === biasedScenario)) ? biasedScenario : SCENARIOS[0].id;
    /* Select first scenario on next frame so GSAP is ready */
    requestAnimationFrame(() => {
      selectScenario(startId, true);
    });
  }

  /* ── Build product images (all stacked in the stage) ── */
  function buildImages() {
    PRODUCTS.forEach(p => {
      const img = document.createElement('img');
      img.src = p.image;
      img.alt = p.name;
      img.className = 'sel-product-img';
      img.dataset.productId = p.id;
      img.loading = 'eager';
      img.decoding = 'async';
      selImgWrap.appendChild(img);
    });
  }

  /* ── Build chips ── */
  function buildChips() {
    SCENARIOS.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'sel-chip';
      btn.dataset.scenario = s.id;
      btn.setAttribute('aria-pressed', 'false');
      btn.setAttribute('aria-label', s.label);
      btn.innerHTML = `<span class="sel-chip-icon" aria-hidden="true">${s.icon}</span><span>${s.label}</span>`;
      btn.addEventListener('click', () => selectScenario(s.id));
      btn.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectScenario(s.id); }
      });
      selChips.appendChild(btn);
    });
  }

  /* ══ Core: select a scenario ══ */
  function selectScenario(id, isInitial = false) {
    if (id === activeScenario && !isInitial) return;
    const prev = activeScenario;
    activeScenario = id;

    const s = SCENARIOS.find(x => x.id === id);
    if (!s) return;

    /* Chip state: immediate visual feedback */
    updateChips(id);

    /* Reset keep button if product changed */
    const prevS = prev ? SCENARIOS.find(x => x.id === prev) : null;
    const productChanged = !prevS || prevS.productId !== s.productId;
    if (productChanged && !isInitial) {
      resetKeepButton();
    }

    /* Update WhatsApp link contextually */
    updateAskLink(s);

    if (isInitial) {
      /* ── Entrance sequence ── */
      updateGlow(s);
      showImage(s.productId, true);
      updateContent(s);
      enterAnimation();
      return;
    }

    /* ── Transition sequence ── */
    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    /* Phase 1: content fades up out */
    tl.to(ANIM_ELS(), {
      opacity: 0, y: -10,
      duration: 0.17,
      stagger: { each: 0.022, from: 'start' },
      ease: 'power2.in',
    });

    /* Phase 2: product image and glow transition */
    if (productChanged) {
      const curImg = document.querySelector(`.sel-product-img[data-product-id="${prevS ? prevS.productId : ''}"]`);
      tl.add(() => {
        updateGlow(s);
        /* Kill floating tween on outgoing image */
        if (floatTween) { floatTween.kill(); floatTween = null; }
      }, 0.06);

      tl.add(() => showImage(s.productId, false, prevS?.productId), 0.09);
    } else {
      tl.add(() => updateGlow(s), 0);
    }

    /* Phase 3: update DOM content mid-transition */
    tl.add(() => updateContent(s), productChanged ? 0.28 : 0.12);

    /* Phase 4: new content fades up in */
    tl.fromTo(ANIM_ELS(),
      { opacity: 0, y: 12 },
      {
        opacity: 1, y: 0,
        duration: 0.36,
        stagger: { each: 0.055, from: 'start' },
      },
      productChanged ? 0.34 : 0.18
    );
  }

  /* ── Image switcher ── */
  function showImage(productId, instant = false, prevProductId = null) {
    const imgs = document.querySelectorAll('.sel-product-img');

    imgs.forEach(img => {
      const isTarget = parseInt(img.dataset.productId) === productId;

      if (isTarget) {
        img.style.zIndex = 2;
        if (instant) {
          gsap.set(img, { opacity: 1, scale: 1, y: 0 });
          startFloat(img);
        } else {
          gsap.fromTo(img,
            { opacity: 0, scale: 1.06, y: -6 },
            {
              opacity: 1, scale: 1, y: 0,
              duration: 0.52,
              ease: 'power3.out',
              onComplete: () => startFloat(img),
            }
          );
        }
      } else if (!instant && prevProductId && parseInt(img.dataset.productId) === prevProductId) {
        gsap.to(img, {
          opacity: 0, scale: 0.93, y: 8,
          duration: 0.32,
          ease: 'power2.in',
          onComplete: () => { img.style.zIndex = 1; gsap.set(img, { y: 0, scale: 1 }); }
        });
      } else if (!isTarget) {
        gsap.set(img, { opacity: 0, zIndex: 1 });
      }
    });
  }

  /* ── Floating breath animation ── */
  function startFloat(img) {
    if (floatTween) floatTween.kill();
    floatTween = gsap.to(img, {
      y: '-9px',
      duration: 3.8,
      ease: 'sine.inOut',
      repeat: -1,
      yoyo: true,
    });
  }

  /* ── Glow colour update ── */
  function updateGlow(s) {
    selGlow.style.background = s.glow;
  }

  /* ── Chip active states ── */
  function updateChips(id) {
    document.querySelectorAll('.sel-chip').forEach(btn => {
      const isTarget = btn.dataset.scenario === id;
      btn.classList.toggle('is-active', isTarget);
      btn.setAttribute('aria-pressed', String(isTarget));

      if (isTarget) {
        /* Spring pop on the selected chip */
        gsap.fromTo(btn,
          { scale: 0.88 },
          { scale: 1, duration: 0.44, ease: 'back.out(2)' }
        );
      }
    });
  }

  /* ── Content DOM update ── */
  function updateContent(s) {
    const p = PRODUCTS.find(x => x.id === s.productId);
    selConfidence.textContent = s.confidence;
    selProductName.textContent = p.name;
    selHeadline.textContent = s.headline;
    selFit.textContent = s.fit;
    selHighlights.innerHTML = s.highlights
      .map(h => `<li>${h}</li>`)
      .join('');
  }

  /* ── WhatsApp link update ── */
  function updateAskLink(s) {
    const p = PRODUCTS.find(x => x.id === s.productId);
    const msg = `Hello Kovin, I'm considering the ${p.name} for ${s.label.toLowerCase()} use. Could you help me decide?`;
    selAskBtn.href = `https://wa.me/917200006006?text=${encodeURIComponent(msg)}`;
  }

  /* ── Entrance animation (first load) ── */
  function enterAnimation() {
    const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reduced) {
      gsap.set(ANIM_ELS(), { opacity: 1, y: 0 });
      return;
    }

    const tl = gsap.timeline({ delay: 0.08 });

    /* Active product image entrance */
    const activeImg = document.querySelector(`.sel-product-img[data-product-id="${SCENARIOS[0].productId}"]`);
    if (activeImg) {
      tl.fromTo(activeImg,
        { scale: 0.84, opacity: 0, y: 10 },
        { scale: 1, opacity: 1, y: 0, duration: 0.78, ease: 'power3.out' },
        0
      );
    }

    /* Chips cascade in */
    tl.fromTo('.sel-chip',
      { y: 18, opacity: 0 },
      { y: 0, opacity: 1, duration: 0.44, stagger: 0.055, ease: 'power3.out' },
      0.32
    );

    /* Content stagger in */
    tl.fromTo(ANIM_ELS(),
      { opacity: 0, y: 14 },
      { opacity: 1, y: 0, duration: 0.38, stagger: 0.065, ease: 'power3.out' },
      0.58
    );
  }

  /* ══ Keep this ready ══ */
  function keepThisReady() {
    const s = SCENARIOS.find(x => x.id === activeScenario);
    if (!s) return;
    const p = PRODUCTS.find(x => x.id === s.productId);
    if (!p) return;

    /* Read existing cart */
    let cart = [];
    try { cart = JSON.parse(localStorage.getItem('kovin-cart')) || []; } catch(e) {}

    /* Add or increment */
    const existing = cart.find(i => i.id === p.id);
    if (existing) {
      existing.qty = Math.min(existing.qty + 1, 10);
    } else {
      cart.push({ ...p, qty: 1, oldPrice: null });
    }

    /* Save */
    try { localStorage.setItem('kovin-cart', JSON.stringify(cart)); } catch(e) {}

    /* Update badge */
    syncCartBadge(cart.reduce((n, i) => n + i.qty, 0));

    /* Button success state */
    selKeepBtn.classList.add('is-added');
    selKeepLabel.textContent = 'Ready — tap cart to review';
    gsap.fromTo(selKeepBtn,
      { scale: 0.94 },
      { scale: 1, duration: 0.45, ease: 'back.out(2.5)' }
    );

    /* Toast */
    showToast(`${p.name} kept ready`);
  }

  function resetKeepButton() {
    selKeepBtn.classList.remove('is-added');
    selKeepLabel.textContent = 'Keep this ready';
  }

  /* ══ Toast ══ */
  function showToast(msg) {
    selToast.textContent = msg;
    clearTimeout(toastTimer);
    gsap.killTweensOf(selToast);
    gsap.fromTo(selToast,
      { opacity: 0, y: 16 },
      {
        opacity: 1, y: 0, duration: 0.32, ease: 'power3.out',
        onComplete: () => {
          toastTimer = setTimeout(() => {
            gsap.to(selToast, { opacity: 0, y: 16, duration: 0.28, ease: 'power2.in' });
          }, 2400);
        }
      }
    );
  }

  /* ══ Cart badge sync ══ */
  function syncCartBadge(count) {
    if (count === undefined) {
      try {
        const cart = JSON.parse(localStorage.getItem('kovin-cart')) || [];
        count = cart.reduce((n, i) => n + i.qty, 0);
      } catch(e) { count = 0; }
    }
    if (count > 0) {
      selCartCount.textContent = count > 9 ? '9+' : count;
      selCartCount.style.display = 'grid';
    } else {
      selCartCount.style.display = 'none';
    }
  }

  /* ══ Navigate to cart on main site ══ */
  function goToCart() {
    window.location.href = 'index.html#cart';
  }

  /* ══ Expose ══ */
  window.keepThisReady = keepThisReady;
  window.goToCart = goToCart;

  /* ══ Boot ══ */
  document.addEventListener('DOMContentLoaded', init);

})();
</script>

<div id="kovin-offline-banner" role="status" aria-live="polite">You're offline — saved products and recent guidance are still available.</div>
<script>
(function () {
  'use strict';

  /* ── Service worker: app-shell caching, offline fallback, push/sync-ready ── */
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js').catch(function () {});
    });
  }

  /* ── In-page offline/online banner (page already loaded, connection drops) ── */
  var offlineBanner = document.getElementById('kovin-offline-banner');
  function setOfflineState(isOffline) {
    if (!offlineBanner) return;
    if (isOffline) {
      offlineBanner.textContent = "You're offline — saved products and recent guidance are still available.";
      offlineBanner.classList.add('is-visible');
    } else {
      offlineBanner.textContent = 'Back online.';
      offlineBanner.classList.add('is-visible');
      setTimeout(function () { offlineBanner.classList.remove('is-visible'); }, 2200);
    }
  }
  window.addEventListener('offline', function () { setOfflineState(true); });
  window.addEventListener('online', function () { setOfflineState(false); });
  if (!navigator.onLine) setOfflineState(true);

  /* ── Native share — used by any element with [data-kovin-share] ── */
  window.kovinShare = function (title, text, url) {
    var shareUrl = url || window.location.href;
    if (navigator.share) {
      navigator.share({ title: title || 'Kovin', text: text || '', url: shareUrl }).catch(function () {});
    } else if (navigator.clipboard) {
      navigator.clipboard.writeText(shareUrl).then(function () {
        if (offlineBanner) {
          offlineBanner.textContent = 'Link copied.';
          offlineBanner.classList.add('is-visible');
          setTimeout(function () { offlineBanner.classList.remove('is-visible'); }, 1800);
        }
      }).catch(function () {});
    }
  };
})();
</script>
<!-- KOVIN-PWA:END -->
